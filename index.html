<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>GeoGlobe</title>
  <link rel="stylesheet" href="app.css?v=5" />
  <script>
    /* Theme bootstrap: set data-theme before first paint to avoid a flash. */
    (function () {
      try {
        var s = JSON.parse(localStorage.getItem("geoglobe.settings") || "{}");
        var pref = s.theme || "system", theme;
        if (pref !== "system") theme = pref;
        else if (matchMedia("(prefers-contrast: more)").matches) theme = "hc";
        else theme = matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", theme);
        var motion = s.motion || "system";
        if (motion === "reduced" || (motion === "system" && matchMedia("(prefers-reduced-motion: reduce)").matches))
          document.documentElement.setAttribute("data-reduced-motion", "");
        if (s.lang) document.documentElement.lang = s.lang;
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="core/app.js?v=1"></script>
</body>
</html>
